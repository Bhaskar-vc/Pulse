<button
  [style]="buttonStyle"
  [class]="getButtonClass()"
  [ngClass]="{ 'btn-disabled': disabled, 'btn-icon': iconOnly }"
  [attr.aria-disabled]="disabled"
  [attr.data-pressed]="pressed"
  (keydown.enter)="handlePress()"
  (keyup.enter)="handleRelease()"
  (mousedown)="handlePress()"
  (mouseup)="handleRelease()"
  (click)="handleClick($event)"
>
  @if (loading) {
    <div class="spinner-container">
      <svg class="spinner" viewBox="0 0 50 50">
        <circle
          class="path"
          cx="25"
          cy="25"
          r="20"
          fill="none"
          stroke="currentColor"
          stroke-width="5"
        ></circle>
      </svg>
    </div>
  } @else {
    @if (iconOnly) {
      <i class="icon" [class]="icon"></i>
    } @else {
      @if (iconLeft !== undefined) {
        <i class="icon" [class]="iconLeft"></i>
      }
      <span class="capitalize">{{ label }}</span>
      @if (iconRight !== undefined) {
        <i class="icon" [class]="iconRight"></i>
      }
    }
  }
</button>
