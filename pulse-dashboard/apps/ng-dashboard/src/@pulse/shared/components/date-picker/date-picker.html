<div class="ds-dp-wrap" (click)="stopProp($event)">

  <!-- ── Trigger button ── -->
  <button class="date-range-btn" (click)="toggle($event)">
    <svg viewBox="0 0 16 16" fill="none" stroke="#667085" stroke-width="1.4" width="15" height="15">
      <rect x="2" y="3" width="12" height="11" rx="1.5"/>
      <line x1="2" y1="6.5" x2="14" y2="6.5"/>
      <line x1="5.5" y1="1.5" x2="5.5" y2="4.5"/>
      <line x1="10.5" y1="1.5" x2="10.5" y2="4.5"/>
    </svg>
    <span>{{ appliedDisplay }}</span>
    <svg viewBox="0 0 20 20" fill="none" stroke="#667085" stroke-width="1.8" width="14" height="14">
      <polyline points="5 8 10 13 15 8"/>
    </svg>
  </button>

  <!-- ── Dropdown ── -->
  <div class="cal-wrap cal-wrap--range ds-dp-dropdown" [class.is-open]="isOpen">

    <!-- Shortcuts sidebar -->
    <div class="cal-shortcuts">
      <button
        class="cal-shortcut"
        *ngFor="let p of presets"
        [class.is-active]="activePreset === p.key"
        (click)="onPresetClick(p.key)">
        {{ p.label }}
      </button>
    </div>

    <!-- Right: dual calendars + footer -->
    <div class="ds-dp-right">

      <div class="ds-dp-panels">

        <!-- Left month panel -->
        <div class="cal-panel">
          <div class="cal-header">
            <button class="cal-nav" (click)="navMonth(-1)">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                <path d="M13 15l-5-5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <span class="cal-month-label">{{ leftLabel }}</span>
            <div style="width:36px"></div>
          </div>
          <div class="cal-grid">
            <div class="cal-day-hd" *ngFor="let d of DAYS">{{ d }}</div>
            <div
              class="cal-cell"
              *ngFor="let cell of leftCells"
              [class.is-out]="cell.isOut"
              [class.is-today]="cell.isToday"
              [class.is-range-start]="cell.isRangeStart"
              [class.is-range-end]="cell.isRangeEnd"
              [class.is-in-range]="cell.isInRange"
              (click)="onCellClick(cell)">
              {{ cell.day }}
            </div>
          </div>
        </div>

        <!-- Right month panel -->
        <div class="cal-panel">
          <div class="cal-header">
            <div style="width:36px"></div>
            <span class="cal-month-label">{{ rightLabel }}</span>
            <button class="cal-nav" (click)="navMonth(1)">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                <path d="M7 5l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="cal-grid">
            <div class="cal-day-hd" *ngFor="let d of DAYS">{{ d }}</div>
            <div
              class="cal-cell"
              *ngFor="let cell of rightCells"
              [class.is-out]="cell.isOut"
              [class.is-today]="cell.isToday"
              [class.is-range-start]="cell.isRangeStart"
              [class.is-range-end]="cell.isRangeEnd"
              [class.is-in-range]="cell.isInRange"
              (click)="onCellClick(cell)">
              {{ cell.day }}
            </div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="cal-footer">
        <div class="cal-date-inputs">
          <input class="cal-date-input" [value]="startInput" readonly placeholder="Start date"/>
          <span class="cal-date-sep">–</span>
          <input class="cal-date-input" [value]="endInput" readonly placeholder="End date"/>
        </div>
        <div class="cal-actions">
          <button class="cal-btn cal-btn-cancel" (click)="cancel()">Cancel</button>
          <button class="cal-btn cal-btn-apply" (click)="apply()">Apply</button>
        </div>
      </div>

    </div>
  </div>

</div>
