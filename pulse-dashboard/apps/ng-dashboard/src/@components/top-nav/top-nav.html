<div class="tn-brand">
  <a class="tn-vc-logo" [routerLink]="['/']">
    <img src="VC-logo.svg" alt="Vantage Circle" width="150" height="22" />
  </a>
  <div class="tn-brand-divider"></div>
  <div class="tn-product-wrap">
    <button class="tn-product-switch" title="Switch product" (click)="toggleProductSwitch()">
      <span class="tn-product-text">Vantage Pulse</span>
      <svg class="tn-product-chevron" viewBox="0 0 10 10" fill="none" width="10" height="10"><path d="M2.5 4l2.5 2.5L7.5 4" stroke="#667085" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="tn-product-panel" [class.open]="productPanelOpen">
      <div class="lnp-title">Explore Other Products</div>
      <div class="lnp-grid">
        <div class="lnp-item">
          <div class="lnp-icon lnp-icon-rewards">
            <svg viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" width="22" height="22"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </div>
          <span class="lnp-name">Vantage Rewards</span>
        </div>
        <div class="lnp-item">
          <div class="lnp-icon lnp-icon-perks">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" width="22" height="22"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>
          </div>
          <span class="lnp-name">Vantage Perks</span>
        </div>
        <div class="lnp-item">
          <div class="lnp-icon lnp-icon-fit">
            <img src="fit-logo.png" alt="Vantage Fit" width="32" height="32" style="object-fit:contain;" />
          </div>
          <span class="lnp-name">Vantage Fit</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="tn-spacer"></div>

<div class="tn-right">
<button class="tn-icon-btn" title="Manage users">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="20" height="20" color="currentColor">
      <path d="M3 20V17.9704C3 16.7281 3.55927 15.5099 4.68968 14.9946C6.0685 14.3661 7.72212 14 9.5 14C10.7448 14 11.9287 14.1795 13 14.5028" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor" stroke-width="1.3"/>
      <circle cx="9.5" cy="7.5" r="3.5" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor" stroke-width="1.3"/>
      <path d="M14.5 4.14453C15.9457 4.57481 17 5.91408 17 7.49959C17 9.0851 15.9457 10.4244 14.5 10.8547" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor" stroke-width="1.3"/>
      <path d="M18 14V20M15 17H21" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor" stroke-width="1.3"/>
    </svg>
  </button>

  <button class="tn-icon-btn" title="Go to old dashboard">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="20" height="20" color="currentColor">
      <path d="M20.302 4.25276C21.5 5.6554 21.5 7.77027 21.5 12C21.5 16.2297 21.5 18.3446 20.302 19.7472C20.1319 19.9464 19.9464 20.1319 19.7472 20.302C18.3446 21.5 16.2297 21.5 12 21.5C7.77027 21.5 5.6554 21.5 4.25276 20.302C4.05358 20.1319 3.86808 19.9464 3.69797 19.7472C2.5 18.3446 2.5 16.2297 2.5 12C2.5 7.77027 2.5 5.6554 3.69797 4.25276C3.86808 4.05358 4.05358 3.86808 4.25276 3.69797C5.6554 2.5 7.77027 2.5 12 2.5C16.2297 2.5 18.3446 2.5 19.7472 3.69797C19.9464 3.86808 20.1319 4.05358 20.302 4.25276Z" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor" stroke-width="1.3"/>
      <path d="M15 9L8 16" stroke-linecap="round" stroke="currentColor" stroke-width="1.3"/>
      <path d="M10 8.11274C10 8.11274 14.8288 7.70569 15.5615 8.43847C16.2943 9.17125 15.8872 14 15.8872 14" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor" stroke-width="1.3"/>
    </svg>
  </button>
  <img class="tn-avatar" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop&crop=faces" alt="Kristin Williams" />
</div>
