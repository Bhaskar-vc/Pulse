<button class="ln-create" title="Create Survey" [routerLink]="['/create-survey']">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <line x1="9" y1="3" x2="9" y2="15" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="3" y1="9" x2="15" y2="9" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  </svg>
  <span class="ln-create-label">New Survey</span>
</button>

<div class="ln-items">

  <!-- Overview -->
  <button class="ln-btn" [routerLink]="['/']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" title="Overview">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="20" height="20" color="currentColor">
      <path d="M2.5 12c0-4.478 0-6.717 1.391-8.109C5.282 2.5 7.521 2.5 12 2.5c4.478 0 6.718 0 8.109 1.391S21.5 7.521 21.5 12c0 4.478 0 6.718-1.391 8.109S16.479 21.5 12 21.5c-4.478 0-6.718 0-8.109-1.391S2.5 16.479 2.5 12Z" stroke="currentColor" stroke-width="1.3"/>
      <path stroke-linejoin="round" d="M2.5 9h19" stroke="currentColor" stroke-width="1.3"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M7 6h.009M11 6h.009" stroke="currentColor" stroke-width="1.3"/>
      <path stroke-linecap="round" d="M17 17a5 5 0 0 0-10 0" stroke="currentColor" stroke-width="1.3"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="m12.707 15.293-1.414 1.414" stroke="currentColor" stroke-width="1.3"/>
    </svg>
    <span class="ln-label">Overview</span>
  </button>

  <!-- Insights -->
  <div class="ln-nav-item" [class.surveys-open]="insightsOpen">
    <button class="ln-btn ln-btn-has-sub" title="Insights" (click)="toggleNavItem('insights')">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="20" height="20" color="currentColor">
        <path d="M21 21H10C6.70017 21 5.05025 21 4.02513 19.9749C3 18.9497 3 17.2998 3 14V3" stroke-linecap="round" stroke="currentColor" stroke-width="1.3"/>
        <path d="M6 12H6.00898M8.9982 12H9.00718M11.9964 12H12.0054M14.9946 12H15.0036M17.9928 12H18.0018M20.991 12H21" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor" stroke-width="1.3"/>
        <path d="M6 7C6.67348 5.87847 7.58712 5 8.99282 5C14.9359 5 11.5954 17 17.9819 17C19.3976 17 20.3057 16.1157 21 15" stroke-linecap="round" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      <span class="ln-label">Insights</span>
      <svg class="ln-chevron" viewBox="0 0 16 16" fill="none" stroke="#9ca3af" stroke-width="1.5"><path d="M5 7l3 3 3-3"/></svg>
      <span class="ln-sub-dot"></span>
    </button>
    <div class="ln-submenu">
      <a class="ln-sub-item" href="#">Categories</a>
      <a class="ln-sub-item" href="#">Questions</a>
      <a class="ln-sub-item" href="#">Comments</a>
      <a class="ln-sub-item" href="#">Heat-map</a>
      <a class="ln-sub-item" href="#">Employee Lifecycle</a>
    </div>
  </div>

  <!-- Surveys -->
  <div class="ln-nav-item" [class.surveys-open]="surveysOpen">
    <button class="ln-btn ln-btn-has-sub" title="Surveys" (click)="toggleNavItem('surveys')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.1">
        <path d="M7 4H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V6a2 2 0 00-2-2h-2"/>
        <rect x="7" y="2" width="6" height="4" rx="1"/>
        <path d="M7 10h6M7 14h4"/>
      </svg>
      <span class="ln-label">Surveys</span>
      <svg class="ln-chevron" viewBox="0 0 16 16" fill="none" stroke="#9ca3af" stroke-width="1.5"><path d="M5 7l3 3 3-3"/></svg>
      <span class="ln-sub-dot"></span>
    </button>
    <div class="ln-submenu">
      <a class="ln-sub-item" [routerLink]="['/create-survey']">Create</a>
      <a class="ln-sub-item" href="#">Manage</a>
      <a class="ln-sub-item" href="#">Questions</a>
      <a class="ln-sub-item" href="#">Template</a>
    </div>
  </div>

  <!-- Action Planning -->
  <button class="ln-btn" title="Action Planning">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.1">
      <circle cx="10" cy="10" r="8"/>
      <path d="M7 10l2 2 4-4"/>
    </svg>
    <span class="ln-label">Action Planning</span>
  </button>

  <!-- Settings -->
  <div class="ln-nav-item" [class.surveys-open]="settingsOpen">
    <button class="ln-btn ln-btn-has-sub" title="Settings" (click)="toggleNavItem('settings')">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="20" height="20" color="currentColor">
        <path d="M2.5 12C2.5 7.52166 2.5 5.28249 3.89124 3.89124C5.28249 2.5 7.52166 2.5 12 2.5C16.4783 2.5 18.7175 2.5 20.1088 3.89124C21.5 5.28249 21.5 7.52166 21.5 12C21.5 16.4783 21.5 18.7175 20.1088 20.1088C18.7175 21.5 16.4783 21.5 12 21.5C7.52166 21.5 5.28249 21.5 3.89124 20.1088C2.5 18.7175 2.5 16.4783 2.5 12Z" stroke-linejoin="round" stroke="currentColor" stroke-width="1.3"/>
        <path d="M10 15.5C10 16.3284 9.32843 17 8.5 17C7.67157 17 7 16.3284 7 15.5C7 14.6716 7.67157 14 8.5 14C9.32843 14 10 14.6716 10 15.5Z" stroke="currentColor" stroke-width="1.3"/>
        <path d="M17 8.5C17 7.67157 16.3284 7 15.5 7C14.6716 7 14 7.67157 14 8.5C14 9.32843 14.6716 10 15.5 10C16.3284 10 17 9.32843 17 8.5Z" stroke="currentColor" stroke-width="1.3"/>
        <path d="M8.5 14V7" stroke-linecap="round" stroke="currentColor" stroke-width="1.3"/>
        <path d="M15.5 10V17" stroke-linecap="round" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      <span class="ln-label">Settings</span>
      <svg class="ln-chevron" viewBox="0 0 16 16" fill="none" stroke="#9ca3af" stroke-width="1.5"><path d="M5 7l3 3 3-3"/></svg>
      <span class="ln-sub-dot"></span>
    </button>
    <div class="ln-submenu">
      <a class="ln-sub-item" href="#">Profile</a>
      <a class="ln-sub-item" href="#">Team</a>
      <a class="ln-sub-item" href="#">Integrations</a>
      <a class="ln-sub-item" href="#">Notifications</a>
    </div>
  </div>

  <!-- Reports -->
  <button class="ln-btn" title="Reports">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.1">
      <path d="M12 2H5a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V8z"/>
      <polyline points="12 2 12 8 18 8"/>
      <line x1="7" y1="11" x2="13" y2="11"/>
      <line x1="7" y1="14" x2="10" y2="14"/>
    </svg>
    <span class="ln-label">Reports</span>
  </button>

  <!-- AI Hub -->
  <button class="ln-btn" [routerLink]="['/ai-hub']" routerLinkActive="active" title="AI Hub">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.1">
      <path d="M10 2l1.5 4.5L16 8l-4.5 1.5L10 14l-1.5-4.5L4 8l4.5-1.5L10 2z"/>
      <path d="M4 14l.75 2.25L7 17l-2.25.75L4 20l-.75-2.25L1 17l2.25-.75L4 14z"/>
    </svg>
    <span class="ln-label">AI Hub</span>
  </button>

</div>

<!-- Bottom: product switcher -->
<div class="ln-bottom">

  <!-- Pro account card -->
  <div class="ln-pro-card">
    <div class="ln-pro-header">
      <span class="ln-pro-title">PULSE</span>
      <span class="ln-pro-badge">Pro</span>
    </div>
    <div class="ln-pro-sub">Unlimited surveys</div>
  </div>
  <!-- Collapsed: pro tag -->
  <div class="ln-pro-dot">Pro</div>

  <div class="ln-product-wrap">
    <!-- Product switcher popup -->
    <div class="ln-product-panel" [class.open]="productSwitchOpen">
      <div class="lnp-title">Explore Other Products</div>
      <div class="lnp-grid">
        <div class="lnp-item">
          <div class="lnp-icon lnp-icon-rewards">
            <svg viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" width="22" height="22"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </div>
          <span class="lnp-name">Vantage Rewards</span>
        </div>
        <div class="lnp-item">
          <div class="lnp-icon lnp-icon-perks">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" width="22" height="22"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>
          </div>
          <span class="lnp-name">Vantage Perks</span>
        </div>
        <div class="lnp-item">
          <div class="lnp-icon lnp-icon-fit">
            <img src="fit-logo.png" alt="Vantage Fit" width="32" height="32" style="object-fit:contain;" />
          </div>
          <span class="lnp-name">Vantage Fit</span>
        </div>
      </div>
    </div>
    <button class="ln-btn ln-product-switch" title="Switch product" (click)="toggleProductSwitch()">
      <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
        <circle cx="5" cy="5" r="2" fill="#6941c6"/>
        <circle cx="10" cy="5" r="2" fill="#6941c6"/>
        <circle cx="15" cy="5" r="2" fill="#6941c6"/>
        <circle cx="5" cy="10" r="2" fill="#6941c6"/>
        <circle cx="10" cy="10" r="2" fill="#6941c6"/>
        <circle cx="15" cy="10" r="2" fill="#6941c6"/>
        <circle cx="5" cy="15" r="2" fill="#6941c6"/>
        <circle cx="10" cy="15" r="2" fill="#6941c6"/>
        <circle cx="15" cy="15" r="2" fill="#6941c6"/>
      </svg>
      <span class="ln-label">Vantage Pulse</span>
    </button>
  </div>
</div>
